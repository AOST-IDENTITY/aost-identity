<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AOST — ACCESS GRANTED</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:#000;
  color:#fff;
  font-family: 'Space Mono', monospace;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  overflow:hidden;
}

/* CONTENEDOR */
.container{
  text-align:center;
  max-width:500px;
  padding:20px;
}

/* TEXTO PRINCIPAL */
.title{
  font-size:clamp(40px,8vw,70px);
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
}

/* SUBTEXTO */
.subtitle{
  margin-top:20px;
  font-size:12px;
  color:#666;
  letter-spacing:0.15em;
}

/* MENSAJE */
.msg{
  margin-top:30px;
  font-size:14px;
  color:#aaa;
  line-height:1.8;
}

/* LINEA */
.line{
  width:60px;
  height:1px;
  background:#e63030;
  margin:30px auto;
}

/* BOTÓN */
.btn{
  margin-top:30px;
  display:inline-block;
  padding:14px 30px;
  border:1px solid #222;
  color:#fff;
  text-decoration:none;
  font-size:11px;
  letter-spacing:0.2em;
  transition:all 0.2s ease;
}

.btn:hover{
  background:#fff;
  color:#000;
  border-color:#fff;
}

/* EFECTO GLITCH SUAVE */
.glitch{
  position:relative;
  display:inline-block;
}

.glitch::before,
.glitch::after{
  content:attr(data-text);
  position:absolute;
  left:0;
  top:0;
  width:100%;
  overflow:hidden;
}

.glitch::before{
  color:#e63030;
  z-index:-1;
  animation:glitch 2s infinite;
}

.glitch::after{
  color:#fff;
  z-index:-2;
  animation:glitch 3s infinite;
}

@keyframes glitch{
  0%{transform:translate(0)}
  20%{transform:translate(-2px,2px)}
  40%{transform:translate(-2px,-2px)}
  60%{transform:translate(2px,2px)}
  80%{transform:translate(2px,-2px)}
  100%{transform:translate(0)}
}
</style>

</head>

<body>
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
<div class="container">

  <h1 class="title glitch" data-text="ACCESS GRANTED">
    ACCESS GRANTED
  </h1>

  <div class="line"></div>

  <p class="msg">
    ESTÁS DENTRO.<br>
    Formas parte del acceso anticipado de AOST.<br><br>
    Recibirás antes que nadie la fecha exacta,<br>
    la hora y el acceso al primer drop.
  </p>

  <p class="subtitle">
    FIRST DROP · LIMITED PIECES · PRIVATE LIST
  </p>

  <a href="index.html" class="btn">
    VOLVER
  </a>

</div>
<script>
const music = document.getElementById("bgMusic");

window.addEventListener("load", () => {
  const shouldPlay = localStorage.getItem("musicPlaying");

  if(shouldPlay === "true"){
    music.volume = 0.6;
    music.play().catch(() => {});
  }
});
</script>
</body>
</html>
